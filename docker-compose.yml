
services:
  web:
    build: .
    container_name: web
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio_net


  nginx:
    image: nginx:stable-alpine
    container_name: portfolio-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
    depends_on:
      - web
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge
